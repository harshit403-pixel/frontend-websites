<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>

        <div class="inner-main">
        <div class="logo">
            <h1>BMI CALCULATOR</h1>
            <span>Body Mass Index</span>
        </div>
        <h4>Enter your details</h4>
        <div class="switch-btn">
            <button id="kilogram">kg,cm</button>
            <button id="inches">lbs,inches</button>
        </div>
        <form class="inputs">
            <input type="text" placeholder="Enter you name">
        <div class="weight-kg">
            <input id="kg" type="number" placeholder="100 kg">
            <input id="cm" type="number" placeholder="100 cm">
        </div>
        <div class="weight-lbs">
            <input id="lbs" type="number" placeholder="100 lbs">
            <input id="inch" type="number" placeholder="100 in">
        </div>
        <button>Calculate</button>
        </form>
        <p class="error">Fill Correct Details</p>
        <div class="result">



    </div>

    <div class="prev-result">
            <p>
        Previous Results
    </p> 
    <button id="reset">Reset</button>
    </div>
    <div class="last-result">

    </div>

        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
